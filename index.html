<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nerdium HTML + CSS + Javascript/Jquery Test</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="swimming-cap-popup" class="hidden popup-overlay">
    <div class="popup-container">
        <!-- Background / Main Image -->
        <img src="https://dvlgqz5pk9vpf.cloudfront.net/2a6799cfe43f458805ebe512935374f3.png" alt="Background Image" class="popup-background-image">
        <!-- Close Button -->
        <button class="popup-close" onclick="closePopup()">×</button>
        <!-- Content Wrapper -->
        <div class="popup-content">
            <!-- Headline -->
            <h2 class="popup-headline">FREE SWIMMING CAP!</h2>
            <!-- Description -->
            <p class="popup-description">
                Claim your free Swim for Sick Kids cap and welcome pack when you register today.
            </p>
            <!-- Urgency Text -->
            <p class="popup-urgency">But hurry, stock is limited and going fast!</p>
            <!-- Swimming Cap Image -->
            <div class="popup-image-container">
                <img src="https://dvlgqz5pk9vpf.cloudfront.net/b1181cd43ffc2340226f6a309498165c.png" alt="Swimming Cap" class="popup-main-image">
            </div>
            <!-- CTA Button -->
            <a style="" href="/register/swim-for-sick-kids" class="mt5 mb5 lump-btn btn-tertiary  default btn popup">SIGN UP NOW!</a>
        </div>
    </div>
</div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
